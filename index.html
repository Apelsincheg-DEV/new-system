<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>SFCE Terminal</title>

<link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  background: #000;
  color: #00ff41;
  font-family: 'VT323', monospace;
  overflow: hidden;
  font-size: 22px;
}

/* CRT */
body::before {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle, transparent 60%, rgba(0,0,0,0.8));
  pointer-events: none;
}

body::after {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  background: repeating-linear-gradient(
    to bottom,
    rgba(255,255,255,0.04) 0px,
    rgba(255,255,255,0.04) 1px,
    transparent 2px
  );
  pointer-events: none;
}

* {
  text-shadow: 0 0 6px #00ff41, 0 0 12px #00ff41;
}

/* ГЛЮК */
.glitch {
  animation: glitch 0.15s infinite;
}

@keyframes glitch {
  0% { transform: translate(0,0); }
  20% { transform: translate(3px,-3px); }
  40% { transform: translate(-3px,3px); filter: hue-rotate(90deg); }
  60% { transform: translate(5px,0); filter: invert(1); }
  80% { transform: translate(-5px,2px); }
  100% { transform: translate(0,0); }
}

/* UI */
.container { padding: 40px; max-width: 1200px; }

.title {
  text-align: center;
  font-size: 64px;
  margin-bottom: 40px;
}

.command {
  cursor: pointer;
  margin: 15px 0;
  font-size: 28px;
  transition: 0.2s;
}

.command:hover {
  text-shadow: 0 0 20px #00ff41, 0 0 40px #00ff41;
  transform: translateX(10px);
}

.errors {
  position: absolute;
  right: 40px;
  top: 40px;
  width: 400px;
  border: 2px solid #00ff41;
  padding: 15px;
  font-size: 20px;
  box-shadow: 0 0 20px #00ff41;
}

.error { color: orange; margin-top: 5px; }

.log {
  position: absolute;
  bottom: 0;
  width: 100%;
  max-height: 180px;
  overflow: hidden;
  border-top: 2px solid #00ff41;
  padding: 15px;
  font-size: 18px;
}

.modal {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  border: 2px solid #00ff41;
  padding: 30px;
  background: black;
  display: none;
  box-shadow: 0 0 30px #00ff41;
}

.progress {
  width: 400px;
  height: 25px;
  border: 1px solid #00ff41;
  margin-top: 15px;
}

.bar {
  height: 100%;
  background: #00ff41;
  width: 0%;
}

.clear {
  position: absolute;
  top: 20px;
  right: 30px;
  cursor: pointer;
}

.critical {
  position: absolute;
  bottom: 220px;
  right: 40px;
  background: red;
  color: white;
  padding: 15px;
  display: none;
  cursor: pointer;
  box-shadow: 0 0 20px red;
}
</style>
</head>

<body id="body">

<div class="clear" onclick="clearScreen()">CLEAR SCREEN</div>

<div class="container">
  <div class="title">Создатель системы SFCE Генри Милс _</div>

  <div class="command" onclick="run('reboot')">> Перезагрузка Системы</div>
  <div class="command" onclick="run('check')">> Проверка системы</div>
  <div class="command" onclick="run('vent')">> Вентиляция</div>
  <div class="command" onclick="run('power')">> Отключение питания</div>
</div>

<div class="errors" id="errors">ЖУРНАЛ ОШИБОК [ACTIVE]</div>
<div class="log" id="log"></div>

<div class="modal" id="modal">
  <div id="modalText"></div>
  <div class="progress"><div class="bar" id="bar"></div></div>
</div>

<div class="critical" id="critical" onclick="emergency()">
  АВАРИЙНАЯ ПЕРЕЗАГРУЗКА
</div>

<!-- 🔊 ЗВУК -->
<audio id="noise" src="noise.mp3"></audio>
<audio id="glitchSound" src="glitch.mp3"></audio>

<script>
let errors = [];
let log = document.getElementById("log");
let errorBox = document.getElementById("errors");
let body = document.getElementById("body");

const noise = document.getElementById("noise");
const glitchSound = document.getElementById("glitchSound");

/* фон звук */
document.body.addEventListener("click", () => {
  noise.volume = 0.2;
  noise.play();

  // повтор каждые 2 минуты
  setInterval(()=>{
    noise.currentTime = 0;
    noise.play();
  },120000);

}, { once: true });

function addLog(text){
  let t = new Date().toLocaleTimeString();
  log.innerHTML += `[${t}] ${text}<br>`;
}

function updateErrors(){
  errorBox.innerHTML = "ЖУРНАЛ ОШИБОК [ACTIVE]<br>";
  errors.forEach(e=>{
    errorBox.innerHTML += `<div class="error">${e}</div>`;
  });

  if(errors.length >= 3){
    body.classList.add("glitch");
    document.getElementById("critical").style.display="block";

    // звук глюка
    glitchSound.currentTime = 0;
    glitchSound.play();

  } else {
    body.classList.remove("glitch");
    document.getElementById("critical").style.display="none";
  }
}

function addError(){
  const list = [
    "Ошибка вентиляции",
    "Error 34: требуется перезагрузка",
    "Перегрев процессора",
    "Низкий уровень питания"
  ];
  let e = list[Math.floor(Math.random()*list.length)];
  errors.push(e);
  updateErrors();
}

function randomErrorLoop(){
  let delay = Math.random()*15000+5000;
  setTimeout(()=>{
    addError();
    randomErrorLoop();
  },delay);
}
randomErrorLoop();

function run(cmd){
  glitchSound.currentTime = 0;
  glitchSound.play();

  let modal = document.getElementById("modal");
  let bar = document.getElementById("bar");

  modal.style.display="block";
  bar.style.width="0%";

  let progress=0;
  let interval=setInterval(()=>{
    progress++;
    bar.style.width=progress+"%";

    if(progress>=100){
      clearInterval(interval);
      modal.style.display="none";
      process(cmd);
    }
  },100);
}

function process(cmd){
  addLog("COMMAND EXECUTED: "+cmd);

  if(cmd==="vent"){
    errors = errors.filter(e=>!e.includes("вентиляции") && !e.includes("Перегрев"));
  }
  if(cmd==="reboot"){
    errors = errors.filter(e=>!e.includes("34"));
  }
  if(cmd==="power"){
    errors = errors.filter(e=>!e.includes("питания"));
  }

  updateErrors();
}

function clearScreen(){
  log.innerHTML="";
}

function emergency(){
  if(errors.length>0){
    errors=[];
    updateErrors();
    addLog("EMERGENCY REBOOT SUCCESS");
  } else {
    addLog("Сейчас нету критической ошибки");
  }
}
</script>

</body>
</html>
